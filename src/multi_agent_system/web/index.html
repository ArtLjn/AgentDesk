<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多Agent工单处理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #161b22 0%, #0d1117 100%);
            border-bottom: 1px solid #30363d;
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 { color: #58a6ff; font-size: 20px; font-weight: 600; }
        .header p { color: #8b949e; font-size: 13px; margin-top: 4px; }
        .header .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #8b949e;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #3fb950;
        }
        .status-dot.offline { background: #f85149; }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 24px 32px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .panel {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
        }
        .panel-header {
            background: #1c2128;
            border-bottom: 1px solid #30363d;
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 600;
            color: #58a6ff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .panel-body { padding: 16px; }
        .full-width { grid-column: 1 / -1; }
        textarea {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
        }
        textarea:focus { outline: none; border-color: #58a6ff; }
        input[type="text"], select {
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            width: 100%;
        }
        input:focus, select:focus { outline: none; border-color: #58a6ff; }
        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: flex-end;
        }
        .form-group { flex: 1; }
        .form-group label {
            display: block;
            color: #8b949e;
            font-size: 12px;
            margin-bottom: 4px;
        }
        button {
            background: #238636;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
            white-space: nowrap;
        }
        button:hover { background: #2ea043; }
        button.secondary { background: #30363d; }
        button.secondary:hover { background: #484f58; }
        button.danger { background: #da3633; }
        button.danger:hover { background: #f85149; }
        .btn-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .result-box {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px;
            font-family: 'SF Mono', 'Cascadia Code', monospace;
            font-size: 12px;
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .ticket-list { list-style: none; }
        .ticket-item {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 10px 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: border-color 0.15s;
        }
        .ticket-item:hover { border-color: #58a6ff; }
        .ticket-item.active { border-color: #58a6ff; background: #1c2128; }
        .ticket-id { color: #58a6ff; font-family: monospace; font-size: 12px; }
        .ticket-content { color: #c9d1d9; font-size: 13px; margin-top: 4px; }
        .ticket-meta {
            display: flex;
            gap: 12px;
            margin-top: 6px;
            font-size: 11px;
            color: #8b949e;
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }
        .badge-technical { background: #1f6feb33; color: #58a6ff; }
        .badge-billing { background: #d2992233; color: #d29922; }
        .badge-complaint { background: #da363333; color: #f85149; }
        .badge-inquiry { background: #23863633; color: #3fb950; }
        .badge-P0 { background: #da363333; color: #f85149; }
        .badge-P1 { background: #d2992233; color: #d29922; }
        .badge-P2 { background: #1f6feb33; color: #58a6ff; }
        .badge-P3 { background: #30363d; color: #8b949e; }
        .badge-completed { background: #23863633; color: #3fb950; }
        .badge-classifying { background: #d2992233; color: #d29922; }
        .badge-processing { background: #1f6feb33; color: #58a6ff; }
        .badge-reviewing { background: #a371f733; color: #a371f7; }
        .badge-failed { background: #da363333; color: #f85149; }
        .badge-received { background: #30363d; color: #8b949e; }
        .detail-section { margin-bottom: 14px; }
        .detail-label { color: #8b949e; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .detail-value { color: #c9d1d9; font-size: 13px; }
        .message-chain { max-height: 200px; overflow-y: auto; }
        .msg-item {
            padding: 6px 10px;
            border-left: 2px solid #30363d;
            margin-bottom: 4px;
            font-size: 12px;
        }
        .msg-role { color: #58a6ff; font-weight: 500; }
        .msg-content { color: #8b949e; margin-top: 2px; }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .stat-card {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 14px;
            text-align: center;
        }
        .stat-value { font-size: 24px; font-weight: 700; color: #58a6ff; }
        .stat-label { font-size: 11px; color: #8b949e; margin-top: 4px; }
        .empty-state { text-align: center; color: #484f58; padding: 32px; font-size: 13px; }
        #toasts {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            background: #1c2128;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 10px 16px;
            font-size: 13px;
            animation: slideIn 0.2s ease;
            min-width: 200px;
        }
        .toast.success { border-left: 3px solid #3fb950; }
        .toast.error { border-left: 3px solid #f85149; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="toasts"></div>

    <div class="header">
        <div>
            <h1>多Agent工单处理系统</h1>
            <p>LangGraph + FastAPI + Qdrant | 4个Agent协作 | 分类 → 处理 → 审核 → 完成</p>
        </div>
        <div class="status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">检测中...</span>
        </div>
    </div>

    <div class="container">
        <!-- 提交工单 -->
        <div class="panel">
            <div class="panel-header">
                <span>提交工单</span>
                <button class="secondary" onclick="loadSampleTicket()">填入示例</button>
            </div>
            <div class="panel-body">
                <div class="form-row">
                    <div class="form-group">
                        <label>用户 ID</label>
                        <input type="text" id="userId" value="U001" />
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:10px">
                    <label>工单内容</label>
                    <textarea id="ticketContent" rows="3" placeholder="描述你遇到的问题..."></textarea>
                </div>
                <button onclick="createTicket()">提交工单</button>
            </div>
        </div>

        <!-- 工单列表 -->
        <div class="panel">
            <div class="panel-header">
                <span>工单列表</span>
                <div style="display:flex;gap:6px">
                    <select id="filterStatus" onchange="loadTickets()" style="width:auto;padding:4px 8px;font-size:12px">
                        <option value="">全部状态</option>
                        <option value="received">已接收</option>
                        <option value="classifying">分类中</option>
                        <option value="processing">处理中</option>
                        <option value="reviewing">审核中</option>
                        <option value="completed">已完成</option>
                        <option value="failed">失败</option>
                    </select>
                    <select id="filterCategory" onchange="loadTickets()" style="width:auto;padding:4px 8px;font-size:12px">
                        <option value="">全部分类</option>
                        <option value="technical">技术支持</option>
                        <option value="billing">账务问题</option>
                        <option value="complaint">投诉建议</option>
                        <option value="inquiry">咨询问询</option>
                    </select>
                    <button class="secondary" onclick="loadTickets()">刷新</button>
                </div>
            </div>
            <div class="panel-body">
                <ul class="ticket-list" id="ticketList">
                    <li class="empty-state">暂无工单，提交一个试试</li>
                </ul>
            </div>
        </div>

        <!-- 工单详情 -->
        <div class="panel full-width">
            <div class="panel-header">
                <span>工单详情</span>
                <button class="secondary" onclick="clearDetail()">清空</button>
            </div>
            <div class="panel-body">
                <div id="detailEmpty" class="empty-state">点击上方工单查看详情</div>
                <div id="detailContent" style="display:none">
                    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px">
                        <div class="detail-section">
                            <div class="detail-label">工单 ID</div>
                            <div class="detail-value" id="dTicketId">-</div>
                        </div>
                        <div class="detail-section">
                            <div class="detail-label">状态</div>
                            <div class="detail-value" id="dStatus">-</div>
                        </div>
                        <div class="detail-section">
                            <div class="detail-label">分类</div>
                            <div class="detail-value" id="dCategory">-</div>
                        </div>
                        <div class="detail-section">
                            <div class="detail-label">优先级</div>
                            <div class="detail-value" id="dPriority">-</div>
                        </div>
                    </div>
                    <div class="detail-section">
                        <div class="detail-label">工单内容</div>
                        <div class="detail-value" id="dContent">-</div>
                    </div>
                    <div class="detail-section">
                        <div class="detail-label">处理结果</div>
                        <div class="detail-value" id="dResult">-</div>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                        <div class="detail-section">
                            <div class="detail-label">审核评分</div>
                            <div class="detail-value" id="dScore">-</div>
                        </div>
                        <div class="detail-section">
                            <div class="detail-label">重试次数</div>
                            <div class="detail-value" id="dRetry">-</div>
                        </div>
                    </div>
                    <div class="detail-section">
                        <div class="detail-label">Agent 消息链</div>
                        <div class="message-chain" id="dMessages"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 统计面板 -->
        <div class="panel">
            <div class="panel-header">
                <span>统计面板</span>
                <button class="secondary" onclick="loadAnalytics()">刷新</button>
            </div>
            <div class="panel-body">
                <div class="stat-grid" id="statsGrid">
                    <div class="stat-card"><div class="stat-value" id="statTotal">-</div><div class="stat-label">总工单</div></div>
                    <div class="stat-card"><div class="stat-value" id="statCompleted">-</div><div class="stat-label">已完成</div></div>
                    <div class="stat-card"><div class="stat-value" id="statFailed">-</div><div class="stat-label">失败</div></div>
                    <div class="stat-card"><div class="stat-value" id="statRate">-</div><div class="stat-label">通过率</div></div>
                </div>
                <div style="margin-top:14px">
                    <div class="detail-label">分类分布</div>
                    <div id="categoryDist" class="result-box" style="max-height:120px;margin-top:4px"></div>
                </div>
            </div>
        </div>

        <!-- 知识库上传 -->
        <div class="panel">
            <div class="panel-header">
                <span>知识库上传</span>
            </div>
            <div class="panel-body">
                <div class="form-group" style="margin-bottom:8px">
                    <label>文档标题</label>
                    <input type="text" id="kbTitle" value="常见问题排查手册" />
                </div>
                <div class="form-group" style="margin-bottom:8px">
                    <label>分类</label>
                    <input type="text" id="kbCategory" value="technical" />
                </div>
                <div class="form-group" style="margin-bottom:8px">
                    <label>内容</label>
                    <textarea id="kbContent" rows="4" placeholder="输入知识库文档内容..."></textarea>
                </div>
                <button onclick="uploadKnowledge()">上传到知识库</button>
            </div>
        </div>

        <!-- 原始 API 响应 -->
        <div class="panel full-width">
            <div class="panel-header">
                <span>原始 API 响应</span>
                <button class="secondary" onclick="clearLog()">清空日志</button>
            </div>
            <div class="panel-body">
                <div class="result-box" id="rawLog" style="max-height:250px">等待请求...</div>
            </div>
        </div>
    </div>

    <script>
        const $ = id => document.getElementById(id);

        // ── 实时刷新状态 ──
        let currentViewingTicket = null;
        let ws = null;
        let wsReconnectTimer = null;
        let refreshTimer = null;

        // 防抖刷新：避免同一时间窗口内多次 WS 消息触发大量 API 请求
        function scheduleRefresh(ticketId) {
            if (refreshTimer) clearTimeout(refreshTimer);
            refreshTimer = setTimeout(() => {
                loadTickets();
                loadAnalytics();
                // 如果当前正在查看这个工单，刷新详情
                if (ticketId && currentViewingTicket === ticketId) {
                    showDetailSilent(ticketId);
                }
            }, 300);
        }

        // 静默刷新详情（不重新触发 active 高亮）
        async function showDetailSilent(ticketId) {
            const data = await api(`/api/tickets/${ticketId}`);
            if (!data) return;
            renderDetail(data);
        }

        // 渲染工单详情（抽取公共逻辑）
        function renderDetail(data) {
            $('detailEmpty').style.display = 'none';
            $('detailContent').style.display = 'block';
            $('dTicketId').textContent = data.ticket_id;
            $('dStatus').innerHTML = `<span class="badge badge-${data.status}">${data.status}</span>`;
            $('dCategory').innerHTML = data.category ? `<span class="badge badge-${data.category}">${data.category}</span>` : '-';
            $('dPriority').innerHTML = data.priority ? `<span class="badge badge-${data.priority}">${data.priority}</span>` : '-';
            $('dContent').textContent = data.content;
            $('dResult').textContent = data.processing_result || '等待处理';
            $('dScore').textContent = data.review_score != null ? data.review_score.toFixed(2) : '-';
            $('dRetry').textContent = `${data.retry_count} / 3`;

            const msgChain = $('dMessages');
            const msgs = [];
            if (data.status) msgs.push({ role: 'system', content: `工单创建，状态: ${data.status}` });
            if (data.category) msgs.push({ role: 'classifier', content: `分类结果: ${data.category} | 优先级: ${data.priority || '-'}` });
            if (data.processing_result) msgs.push({ role: 'processor', content: data.processing_result });
            if (data.review_score != null) msgs.push({ role: 'reviewer', content: `审核评分: ${data.review_score.toFixed(2)} ${data.review_score >= 0.7 ? '(通过)' : '(未通过)'}` });
            if (data.error) msgs.push({ role: 'coordinator', content: `错误: ${data.error}` });
            if (data.retry_count > 0) msgs.push({ role: 'system', content: `已重试 ${data.retry_count} 次` });

            if (msgs.length > 0) {
                msgChain.innerHTML = msgs.map(m => `
                    <div class="msg-item">
                        <span class="msg-role">[${m.role}]</span>
                        <div class="msg-content">${m.content}</div>
                    </div>
                `).join('');
            } else {
                msgChain.innerHTML = '<div style="color:#484f58">等待处理中...</div>';
            }
        }

        // ── WebSocket 连接 ──
        function connectWS() {
            if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return;

            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const url = `${protocol}//${location.host}/api/ws/monitor`;
            ws = new WebSocket(url);

            ws.onopen = () => {
                log('WebSocket', '已连接全局监控');
                if (wsReconnectTimer) { clearInterval(wsReconnectTimer); wsReconnectTimer = null; }
            };

            ws.onmessage = (event) => {
                try {
                    const update = JSON.parse(event.data);
                    log(`WS 推送 [${update.node || '?'}]`, update);
                    // 显示实时通知
                    toast(`${update.message} (${update.ticket_id})`);
                    // 防抖刷新列表 + 统计 + 详情
                    scheduleRefresh(update.ticket_id);
                } catch (e) {
                    log('WS 解析错误', e.message);
                }
            };

            ws.onclose = () => {
                log('WebSocket', '连接断开，3秒后重连...');
                ws = null;
                if (!wsReconnectTimer) {
                    wsReconnectTimer = setInterval(() => {
                        if (!ws || ws.readyState === WebSocket.CLOSED) connectWS();
                    }, 3000);
                }
            };

            ws.onerror = () => ws.close();
        }

        function toast(msg, type = 'success') {
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.textContent = msg;
            $('toasts').appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        function log(title, data) {
            const now = new Date().toLocaleTimeString();
            const entry = `\n[${now}] ${title}\n${typeof data === 'string' ? data : JSON.stringify(data, null, 2)}\n${'─'.repeat(60)}`;
            $('rawLog').textContent += entry;
            $('rawLog').scrollTop = $('rawLog').scrollHeight;
        }

        async function api(path, opts = {}) {
            try {
                const res = await fetch(path, {
                    headers: { 'Content-Type': 'application/json' },
                    ...opts,
                });
                const data = await res.json();
                log(`${opts.method || 'GET'} ${path}`, data);
                return data;
            } catch (e) {
                log(`ERROR ${path}`, e.message);
                toast(e.message, 'error');
                return null;
            }
        }

        async function checkHealth() {
            const dot = $('statusDot');
            const text = $('statusText');
            try {
                const res = await fetch('/api/tickets?limit=1');
                if (res.ok) {
                    dot.className = 'status-dot';
                    text.textContent = '服务在线';
                } else throw new Error();
            } catch {
                dot.className = 'status-dot offline';
                text.textContent = '服务离线';
            }
        }

        const sampleTickets = [
            { content: "系统突然崩溃，无法启动，报错代码 ERR-5001", user_id: "U001" },
            { content: "如何修改个人资料？找不到入口", user_id: "U002" },
            { content: "退款什么时候到账？已经申请3天了", user_id: "U003" },
            { content: "我要投诉你们的客服，态度太差了！", user_id: "U001" },
            { content: "数据库连接超时，整个系统无法访问，紧急！", user_id: "U003" },
            { content: "上个月的账单金额不对，多扣了200元", user_id: "U002" },
            { content: "怎么导出报表为Excel格式？", user_id: "U001" },
            { content: "API接口返回403错误，权限配置有问题", user_id: "U003" },
            { content: "不满服务降级，我是付费用户凭什么限制功能", user_id: "U002" },
            { content: "如何绑定企业微信？有没有接入文档", user_id: "U001" },
        ];

        function loadSampleTicket() {
            const s = sampleTickets[Math.floor(Math.random() * sampleTickets.length)];
            $('ticketContent').value = s.content;
            $('userId').value = s.user_id;
        }

        async function createTicket() {
            const content = $('ticketContent').value.trim();
            if (!content) { toast('请输入工单内容', 'error'); return; }
            const user_id = $('userId').value.trim() || undefined;
            const data = await api('/api/tickets', {
                method: 'POST',
                body: JSON.stringify({ content, user_id }),
            });
            if (data) {
                toast(`工单已创建: ${data.ticket_id}`);
                $('ticketContent').value = '';
                loadTickets();
            }
        }

        async function loadTickets() {
            const params = new URLSearchParams();
            const status = $('filterStatus').value;
            const category = $('filterCategory').value;
            if (status) params.set('status', status);
            if (category) params.set('category', category);
            const data = await api(`/api/tickets?${params}`);
            if (!data) return;
            const tickets = Array.isArray(data) ? data : [];
            const list = $('ticketList');
            if (tickets.length === 0) {
                list.innerHTML = '<li class="empty-state">暂无工单</li>';
                return;
            }
            list.innerHTML = tickets.map(t => `
                <li class="ticket-item" onclick="showDetail('${t.ticket_id}', this)">
                    <div class="ticket-id">${t.ticket_id}</div>
                    <div class="ticket-content">${t.content.slice(0, 60)}${t.content.length > 60 ? '...' : ''}</div>
                    <div class="ticket-meta">
                        ${t.category ? `<span class="badge badge-${t.category}">${t.category}</span>` : ''}
                        ${t.priority ? `<span class="badge badge-${t.priority}">${t.priority}</span>` : ''}
                        <span class="badge badge-${t.status}">${t.status}</span>
                        ${t.review_score != null ? `<span>评分: ${t.review_score.toFixed(2)}</span>` : ''}
                    </div>
                </li>
            `).join('');
        }

        async function showDetail(ticketId, el) {
            currentViewingTicket = ticketId;
            const data = await api(`/api/tickets/${ticketId}`);
            if (!data) return;
            renderDetail(data);
            document.querySelectorAll('.ticket-item').forEach(e => e.classList.remove('active'));
            if (el) el.classList.add('active');
        }

        function clearDetail() {
            $('detailEmpty').style.display = '';
            $('detailContent').style.display = 'none';
        }

        async function loadAnalytics() {
            const data = await api('/api/analytics');
            if (!data) return;
            $('statTotal').textContent = data.resolution_stats?.total ?? '-';
            $('statCompleted').textContent = data.resolution_stats?.completed ?? '-';
            $('statFailed').textContent = data.resolution_stats?.failed ?? '-';
            $('statRate').textContent = data.resolution_stats?.success_rate != null
                ? (data.resolution_stats.success_rate * 100).toFixed(0) + '%' : '-';

            const dist = data.category_distribution || {};
            $('categoryDist').textContent = Object.entries(dist).map(([k, v]) => `${k}: ${v}`).join('\n') || '暂无数据';
        }

        async function uploadKnowledge() {
            const title = $('kbTitle').value.trim();
            const content = $('kbContent').value.trim();
            const category = $('kbCategory').value.trim();
            if (!title || !content) { toast('请填写标题和内容', 'error'); return; }
            const data = await api('/api/knowledge', {
                method: 'POST',
                body: JSON.stringify({ title, content, category }),
            });
            if (data) toast('知识库上传成功');
        }

        function clearLog() { $('rawLog').textContent = '日志已清空'; }

        // 页面加载后自动初始化
        checkHealth();
        loadTickets();
        loadAnalytics();
        connectWS();
    </script>
</body>
</html>
