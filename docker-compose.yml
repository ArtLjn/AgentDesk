services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  api:
    build:
      context: .
      args:
        - PIP_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn
    ports:
      - "8001:8000"
    depends_on:
      - qdrant
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDING_BASE_URL=http://host.docker.internal:11434
      - CACHE_ENABLED=true
      - CACHE_MAX_SIZE=512
      - CACHE_TTL=300
    volumes:
      - ./data:/app/data
    restart: unless-stopped

volumes:
  qdrant_storage:
