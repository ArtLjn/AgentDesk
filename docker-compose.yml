services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  api:
    build:
      context: .
      args:
        - PIP_INDEX_URL=https://pypi.org/simple
    ports:
      - "8001:8000"
    depends_on:
      - qdrant
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # 仅容器内覆盖；默认值来自挂载的 config.yaml
      - QDRANT_URL=http://qdrant:6333
      - CACHE_ENABLED=true
      - CACHE_MAX_SIZE=512
      - CACHE_TTL=300
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped

volumes:
  qdrant_storage:
