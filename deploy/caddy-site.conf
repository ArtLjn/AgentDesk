# AgentDesk - workorder.lllcnm.cn
# 静态前端 + API 反代到本地 9001 端口
# 此片段由 deploy.sh 追加到 /etc/caddy/Caddyfile，不要手动编辑主 Caddyfile
#
# 用 handle 互斥路由块：匹配后停止后续处理，避免 try_files 在 reverse_proxy 之前
# 把 /health 等不存在静态文件的路径重写成 /index.html。

workorder.lllcnm.cn {
	root * /root/workspace/static/agent-desk
	encode zstd gzip

	# 静态资源长缓存
	header /assets/* {
		Cache-Control "public, max-age=31536000, immutable"
	}

	# API 与监控端点反代到 uvicorn
	handle /api/* {
		reverse_proxy 127.0.0.1:9001 {
			header_up X-Real-IP {remote_host}
			header_up X-Forwarded-Host {host}
		}
	}
	handle /health {
		reverse_proxy 127.0.0.1:9001
	}
	handle /metrics {
		reverse_proxy 127.0.0.1:9001
	}
	handle /prometheus {
		reverse_proxy 127.0.0.1:9001
	}

	# SPA 客户端路由回退（兜底）
	handle {
		try_files {path} /index.html
		file_server
	}
}
